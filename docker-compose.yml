services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: poputchik
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: poputchik
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poputchik"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://poputchik:secret@db:5432/poputchik
      - VK_GROUP_TOKEN=${VK_GROUP_TOKEN}
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - ADMIN_IDS=${ADMIN_IDS}
      - LOG_FILE=/app/logs/bot.log
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data: